<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<!-- /etc/fonts/fonts.conf file to configure system font access -->

<fontconfig>
	<description>Azura Font Config</description>
	<alias>
		<family>sans-serif</family>
		<prefer>
			<family>Inter</family>
		</prefer>
	</alias>
</fontconfig>
