vsync = true;
backend = "glx";
use-experimental-backends = true;

opacity-rule = [
#     "95:!fullscreen && class_g *= ''",
     "73:class_g = 'kitty' && focused",
     "73:class_g = 'kitty' && !focused",
     "96:class_g = 'Google-chrome' && focused",
     "96:class_g = 'Google-chrome' && !focused",
     "90:class_g = 'discord' && focused",
     "90:class_g = 'discord' && !focused",
     "90:class_g = 'Spotify' && focused",
     "90:class_g = 'Spotify' && !focused",
     "100:class_g = 'desktop.py' && focused",
     "100:class_g = 'desktop.py' && !focused",
     "100:class_g = 'firefox' && focused"
];

frame-opacity = 0.75;
blur-background = true;
blur-background-frame = true;
blur-kern = "7x7box";
corner-radius = 12;

saturation = 2;
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 10;

blur:
{
  method = "dual_kawase";
  strength = 12;
  background = true;
  background-frame = true;
  background-fixed = false;
};

shadow = true;
shadow-radius = 14;
shadow-opacity = 0.45;
shadow-offset-x = -15;
shadow-offset-y = -5;

blur-background-fixed = true;
